# GitVersion 6 ‚Äî see https://gitversion.net/docs/reference/configuration
#
# Bump rules (in priority order):
#   1. `+semver: skip|none`           ‚Üí no bump
#   2. `+semver: major|breaking`      ‚Üí major  (DO NOT USE while pre-release)
#   3. `+semver: minor|feature`       ‚Üí minor
#   4. Conventional Commit `feat:`    ‚Üí minor
#   5. `+semver: patch|fix`           ‚Üí patch
#   6. Conventional Commit `fix:`     ‚Üí patch
#   7. anything else                  ‚Üí patch  (default)
#
# `next-version` is the floor. Bump it manually when graduating to 1.0.0.
#
# Anchoring tags: GitVersion counts commits since the most recent reachable
# tag. After the first manual marketplace upload, tag main HEAD:
#     git tag v0.0.13 && git push --tags
# so subsequent commits count from that anchor instead of from repo init.

next-version: 0.0.14

branches:
  main:
    mode: ContinuousDeployment
    increment: Patch
    label: ''

# Default GitVersion regexes match `+semver: ...` footers. We extend the
# minor + patch regexes to also recognise Conventional Commits prefixes
# (`feat:` / `feat(scope):` / `feat!:` ‚Üí minor, `fix:` / `fix(scope):` ‚Üí patch).
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)|^feat(\(.+\))?!?:'
patch-version-bump-message: '\+semver:\s?(fix|patch)|^fix(\(.+\))?!?:'
no-bump-message: '\+semver:\s?(none|skip)'
