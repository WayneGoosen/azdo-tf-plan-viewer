<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraform Plan</title>
    <script src="https://cdn.vsassets.io/v/M226_20231120.2/_content/Sdk/SDK.min.js"></script>
    <style>
        :root {
            /* ADO theme tokens with safe fallbacks for non-themed environments. */
            --plan-text:        var(--text-primary-color, #1f1f1f);
            --plan-text-muted:  var(--text-secondary-color, #6c6c6c);
            --plan-bg:          var(--background-color, #ffffff);
            --plan-bg-elev:     var(--callout-background-color, #f6f6f6);
            --plan-border:      var(--palette-neutral-8, #e1e1e1);
            --plan-border-soft: var(--palette-neutral-4, #ededed);
            --plan-accent:      var(--communication-foreground, #0078d4);

            --plan-create:      var(--status-success-foreground, #107c10);
            --plan-update:      var(--status-warning-foreground, #c19c00);
            --plan-delete:      var(--status-error-foreground, #d13438);
            --plan-recreate:    #8764b8;
            --plan-noop:        var(--text-secondary-color, #6c6c6c);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--plan-bg);
            color: var(--plan-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px;
            line-height: 1.4;
        }

        #container {
            padding: 16px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ---- header ---- */
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 4px 0 8px;
        }
        .header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }
        .meta-pill {
            font-size: 11px;
            padding: 2px 8px;
            border: 1px solid var(--plan-border);
            border-radius: 10px;
            color: var(--plan-text-muted);
        }

        /* ---- summary ---- */
        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        .summary-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            padding: 10px 14px;
            border: 1px solid var(--plan-border);
            border-left-width: 3px;
            border-radius: 4px;
            background: var(--plan-bg);
            color: var(--plan-text);
            cursor: pointer;
            font: inherit;
            text-align: left;
            transition: background-color 0.1s;
        }
        .summary-card:hover { background: var(--plan-bg-elev); }
        .summary-card.is-active { background: var(--plan-bg-elev); box-shadow: inset 0 0 0 1px var(--plan-accent); }
        .summary-create   { border-left-color: var(--plan-create); }
        .summary-update   { border-left-color: var(--plan-update); }
        .summary-recreate { border-left-color: var(--plan-recreate); }
        .summary-delete   { border-left-color: var(--plan-delete); }
        .summary-count { font-size: 22px; font-weight: 600; line-height: 1; }
        .summary-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--plan-text-muted); }

        /* ---- controls ---- */
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }
        .search {
            flex: 1;
            min-width: 0;
            padding: 6px 10px;
            font: inherit;
            color: var(--plan-text);
            background: var(--plan-bg);
            border: 1px solid var(--plan-border);
            border-radius: 3px;
        }
        .search:focus {
            outline: none;
            border-color: var(--plan-accent);
        }
        .control-buttons { display: flex; gap: 4px; }
        .control-btn {
            font: inherit;
            padding: 5px 10px;
            background: var(--plan-bg);
            color: var(--plan-text);
            border: 1px solid var(--plan-border);
            border-radius: 3px;
            cursor: pointer;
        }
        .control-btn:hover { background: var(--plan-bg-elev); }

        /* ---- tree ---- */
        .module-node {
            border: 1px solid var(--plan-border-soft);
            border-radius: 3px;
            margin-bottom: 6px;
            background: var(--plan-bg);
        }
        .module-summary {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            cursor: pointer;
            user-select: none;
            list-style: none;
        }
        .module-summary::-webkit-details-marker { display: none; }
        .module-summary::before {
            content: '▸';
            display: inline-block;
            transition: transform 0.1s;
            color: var(--plan-text-muted);
            width: 12px;
        }
        details[open] > .module-summary::before { transform: rotate(90deg); }
        .module-label { font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace; font-size: 12px; font-weight: 600; }
        .module-body { padding: 4px 10px 8px 26px; }

        .count-pills { display: inline-flex; gap: 4px; margin-left: auto; }
        .count-pill {
            font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 8px;
            background: var(--plan-bg-elev);
            color: var(--plan-text-muted);
        }
        .count-create   { color: var(--plan-create); }
        .count-update   { color: var(--plan-update); }
        .count-recreate { color: var(--plan-recreate); }
        .count-delete   { color: var(--plan-delete); }

        /* ---- resource ---- */
        .resource {
            border: 1px solid var(--plan-border-soft);
            border-left-width: 3px;
            border-radius: 3px;
            margin: 4px 0;
            background: var(--plan-bg);
        }
        .resource-create   { border-left-color: var(--plan-create); }
        .resource-update   { border-left-color: var(--plan-update); }
        .resource-recreate { border-left-color: var(--plan-recreate); }
        .resource-delete   { border-left-color: var(--plan-delete); }
        .resource-noop, .resource-read { border-left-color: var(--plan-noop); }

        .resource-summary {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            cursor: pointer;
            user-select: none;
            list-style: none;
        }
        .resource-summary::-webkit-details-marker { display: none; }
        .resource-summary::before {
            content: '▸';
            display: inline-block;
            transition: transform 0.1s;
            color: var(--plan-text-muted);
            width: 12px;
        }
        details[open] > .resource-summary::before { transform: rotate(90deg); }
        .resource-address {
            font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: var(--plan-text);
        }
        .resource-type {
            font-size: 11px;
            color: var(--plan-text-muted);
            margin-left: auto;
        }

        .action-badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 2px;
            color: #fff;
            min-width: 70px;
            text-align: center;
            flex-shrink: 0;
        }
        .action-create   { background: var(--plan-create); }
        .action-update   { background: var(--plan-update); color: #1f1f1f; }
        .action-delete   { background: var(--plan-delete); }
        .action-recreate { background: var(--plan-recreate); }
        .action-noop, .action-read { background: var(--plan-noop); }

        /* ---- resource body / diff ---- */
        .resource-body { padding: 4px 12px 12px 26px; }
        .replace-section {
            margin: 8px 0;
            padding: 8px 12px;
            background: color-mix(in srgb, var(--plan-recreate) 10%, transparent);
            border-radius: 3px;
        }
        .replace-title { font-size: 11px; font-weight: 600; color: var(--plan-recreate); margin-bottom: 4px; }
        .replace-reasons {
            margin: 0;
            padding-left: 18px;
            font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
            font-size: 12px;
        }

        .diff {
            font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            background: var(--plan-bg-elev);
            border: 1px solid var(--plan-border-soft);
            border-radius: 3px;
            padding: 4px 0;
            margin-top: 6px;
        }
        .diff-row {
            display: grid;
            grid-template-columns: 18px minmax(120px, max-content) 1fr auto 1fr;
            gap: 6px;
            padding: 1px 10px;
            align-items: baseline;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .diff-add { background: color-mix(in srgb, var(--plan-create) 8%, transparent); }
        .diff-del { background: color-mix(in srgb, var(--plan-delete) 8%, transparent); }
        .diff-mod { background: color-mix(in srgb, var(--plan-update) 6%, transparent); }
        .diff-glyph { font-weight: 700; text-align: center; }
        .diff-add .diff-glyph { color: var(--plan-create); }
        .diff-del .diff-glyph { color: var(--plan-delete); }
        .diff-mod .diff-glyph { color: var(--plan-update); }
        .diff-key { color: var(--plan-text); font-weight: 500; }
        .diff-arrow { color: var(--plan-text-muted); }
        .diff-before { color: var(--plan-delete); }
        .diff-add .diff-after { color: var(--plan-create); }
        .diff-mod .diff-after { color: var(--plan-create); }

        .no-diff {
            font-size: 12px;
            color: var(--plan-text-muted);
            font-style: italic;
            padding: 4px 0;
        }

        /* ---- outputs ---- */
        .outputs { margin-top: 24px; }
        .outputs h2 { font-size: 16px; margin: 0 0 8px; }
        .outputs-list {
            border: 1px solid var(--plan-border-soft);
            border-radius: 3px;
        }
        .output-row {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 6px 10px;
            border-bottom: 1px solid var(--plan-border-soft);
        }
        .output-row:last-child { border-bottom: none; }
        .output-name { font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace; font-size: 12px; }
        .output-value { font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace; font-size: 12px; color: var(--plan-text-muted); margin-left: auto; }

        /* ---- status / empty ---- */
        .status, .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        .status-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
        .status-error .status-title { color: var(--plan-delete); }
        .status-message { color: var(--plan-text-muted); max-width: 480px; }
        .empty { color: var(--plan-text-muted); font-style: italic; }
    </style>
</head>
<body>
    <div id="container">
        <div class="status status-loading">
            <div class="status-title">Loading Terraform plan…</div>
        </div>
    </div>
    <script src="tab.js"></script>
</body>
</html>
