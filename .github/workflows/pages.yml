name: Docs

# Builds the Material for MkDocs site and deploys it to GitHub Pages.
# Source lives in docs/ + mkdocs.yml. Marketplace screenshots are copied in at
# build time (docs/assets/images is generated, not committed) so there's a
# single source of truth for the images.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'marketplace/images/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs Material
        run: pip install -r docs/requirements.txt

      - name: Stage screenshots into the docs tree
        run: |
          set -e
          mkdir -p docs/assets/images
          cp marketplace/images/*.png docs/assets/images/

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
